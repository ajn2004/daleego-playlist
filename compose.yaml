services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rotator
      POSTGRES_PASSWORD: rotator
      POSTGRES_DB: rotator
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotator"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HTTP_ADDR:-8090}:8090"
    environment:
      DATABASE_URL: postgres://rotator:rotator@postgres:5433/rotator?sslmode=disable
      HTTP_ADDR: ":8090"
      PLEX_URL: "${PLEX_URL}"
      PLEX_TOKEN: "${PLEX_TOKEN}"
      PLEX_PLAYLIST_NAME: "${PLEX_PLAYLIST_NAME:-TV Rotation}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      SYNC_INTERVAL: "${SYNC_INTERVAL:-60s}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: